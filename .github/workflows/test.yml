name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest psycopg2-binary asyncpg fastapi httpx
      - name: Run unit and sqlite e2e tests
        env:
          PYTHONPATH: .
        run: pytest tests/ e2e_test/test_e2e.py -v
        # Note: test_e2e_postgres.py is intentionally excluded — it requires
        # IAST_TEST_DATABASE_URL which is not available in CI and self-skips anyway
